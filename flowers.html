<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Prakriti 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#e8607d;
    --rose-deep:#c43e63;
    --rose-light:#f8a5bb;
    --blush:#f7d4dd;
    --peony:#f4a3c4;
    --gold:#e9c46a;
    --leaf:#6aa37a;
    --leaf-deep:#3f7355;
    --ribbon:#d98a9b;
    --ink:#fff4f6;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{height:100%;}

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:radial-gradient(140% 120% at 50% 0%, #3a2342 0%, #25182f 45%, #150d1d 100%);
    font-family:'Cormorant Garamond', serif;
    color:var(--ink);
    cursor:pointer;
    transition:background 2.5s ease;
  }

  body.bloomed{
    background:radial-gradient(140% 120% at 50% -10%, #6d4063 0%, #43294a 50%, #221428 100%);
  }

  /* soft drifting glow orbs */
  .glow{
    position:fixed; border-radius:50%; filter:blur(60px);
    opacity:.0; pointer-events:none; transition:opacity 2.5s ease;
  }
  .glow.g1{ width:380px;height:380px; left:8%; top:12%;
    background:radial-gradient(circle, rgba(244,163,196,.55), transparent 70%); }
  .glow.g2{ width:320px;height:320px; right:6%; bottom:14%;
    background:radial-gradient(circle, rgba(233,196,106,.45), transparent 70%); }
  body.bloomed .glow{ opacity:1; animation:floatGlow 9s ease-in-out infinite alternate; }
  .glow.g2{ animation-delay:-4s; }
  @keyframes floatGlow{ from{transform:translateY(0) translateX(0);} to{transform:translateY(-28px) translateX(20px);} }

  .stage{ position:relative; width:min(92vw,560px); height:88vh; max-height:760px;
    display:flex; align-items:flex-end; justify-content:center; }

  /* ---------- PROMPT ---------- */
  .prompt{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:26px; text-align:center;
    transition:opacity .8s ease, transform .8s ease;
  }
  .prompt.hide{ opacity:0; transform:scale(.92); pointer-events:none; }

  .gift{ width:120px; height:120px; position:relative; animation:breathe 2.8s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-10px) scale(1.04);} }
  .gift svg{ width:100%; height:100%; filter:drop-shadow(0 10px 26px rgba(233,96,125,.5)); }

  .prompt h1{ font-family:'Parisienne',cursive; font-weight:400; font-size:clamp(34px,7vw,52px);
    color:#fff; letter-spacing:.5px; text-shadow:0 4px 24px rgba(244,163,196,.5); }
  .prompt p{ font-size:clamp(17px,4vw,21px); letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,240,246,.72); }
  .pulse-dot{ display:inline-block; width:9px;height:9px;border-radius:50%; background:var(--rose-light);
    margin-left:4px; box-shadow:0 0 0 0 rgba(248,165,187,.7); animation:ping 1.8s infinite; }
  @keyframes ping{ 0%{box-shadow:0 0 0 0 rgba(248,165,187,.6);} 70%{box-shadow:0 0 0 16px rgba(248,165,187,0);} 100%{box-shadow:0 0 0 0 rgba(248,165,187,0);} }

  /* ---------- BOUQUET ---------- */
  .bouquet{ position:relative; width:520px; max-width:96vw; aspect-ratio:1/1.18;
    opacity:0; transform:translateY(40px) scale(.9); pointer-events:none; }
  .bouquet.show{ opacity:1; transform:translateY(0) scale(1);
    transition:opacity 1s ease .1s, transform 1.2s cubic-bezier(.2,.8,.25,1) .1s; }

  .bouquet svg{ width:100%; height:100%; overflow:visible; }

  /* stems / leaves draw + grow */
  .stem{ transform-origin:bottom center; transform:scaleY(0); animation:growStem 1.1s cubic-bezier(.2,.85,.3,1) forwards; }
  @keyframes growStem{ to{transform:scaleY(1);} }

  .leaf{ transform-box:fill-box; transform-origin:bottom center; transform:scale(0) rotate(-8deg); opacity:0;
    animation:unfurl .9s cubic-bezier(.2,.9,.3,1) forwards; }
  @keyframes unfurl{ to{transform:scale(1) rotate(0); opacity:1;} }

  /* each flower head */
  .flower{ transform-box:fill-box; transform-origin:center; transform:scale(0) rotate(-40deg); opacity:0;
    animation:bloom 1.1s cubic-bezier(.18,.9,.25,1.1) forwards; }
  @keyframes bloom{ 0%{transform:scale(0) rotate(-40deg);opacity:0;}
    60%{opacity:1;} 100%{transform:scale(1) rotate(0);opacity:1;} }

  /* gentle perpetual sway after bloom */
  .sway{ transform-origin:bottom center; animation:sway 6s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{transform:rotate(-1.3deg);} 50%{transform:rotate(1.3deg);} }

  .wrap{ transform-box:fill-box; transform-origin:bottom center; transform:scaleY(0); opacity:0;
    animation:growStem 1s ease forwards; }

  /* ---------- MESSAGE ---------- */
  .message{ position:absolute; left:50%; bottom:-2%; transform:translate(-50%,30px);
    text-align:center; opacity:0; pointer-events:none; width:120%; }
  .message.show{ opacity:1; transform:translate(-50%,0);
    transition:opacity 1.2s ease, transform 1.2s cubic-bezier(.2,.8,.25,1); }
  .message .line{ font-size:clamp(20px,4.6vw,28px); letter-spacing:1px; color:rgba(255,240,246,.92);
    font-style:italic; }
  .message .name{ display:block; font-family:'Parisienne',cursive; font-style:normal;
    font-size:clamp(46px,11vw,82px); line-height:1; margin-top:6px;
    background:linear-gradient(120deg,#fbd3df,#f4a3c4,#e9c46a);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 18px rgba(244,163,196,.45)); }

  /* falling petals */
  .petalfall{ position:fixed; top:-30px; pointer-events:none; opacity:0; }
  body.bloomed .petalfall{ animation:fall linear infinite; }
  @keyframes fall{
    0%{ transform:translateY(-30px) rotate(0); opacity:0; }
    10%{ opacity:.9; }
    100%{ transform:translateY(102vh) rotate(540deg); opacity:0; }
  }

  /* replay */
  .replay{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25);
    color:var(--ink); font-family:'Cormorant Garamond',serif; font-size:16px; letter-spacing:1.5px;
    padding:9px 22px; border-radius:30px; backdrop-filter:blur(8px); cursor:pointer;
    opacity:0; pointer-events:none; transition:opacity .6s ease .4s, background .25s; text-transform:uppercase; }
  .replay.show{ opacity:1; pointer-events:auto; }
  .replay:hover{ background:rgba(255,255,255,.22); }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <div class="stage">
    <!-- PROMPT -->
    <div class="prompt" id="prompt">
      <div class="gift">
        <svg viewBox="0 0 100 100" fill="none">
          <rect x="18" y="40" width="64" height="48" rx="6" fill="#e8607d"/>
          <rect x="18" y="40" width="64" height="13" rx="4" fill="#c43e63"/>
          <rect x="44" y="40" width="12" height="48" fill="#f8a5bb"/>
          <path d="M50 40c-6-14-26-12-22 1 3 9 22 -1 22-1z" fill="#e9c46a"/>
          <path d="M50 40c6-14 26-12 22 1-3 9-22-1-22-1z" fill="#e9c46a"/>
          <circle cx="50" cy="38" r="5" fill="#f4d27a"/>
        </svg>
      </div>
      <h1>A little something</h1>
      <p>Tap anywhere to open<span class="pulse-dot"></span></p>
    </div>

    <!-- BOUQUET -->
    <div class="bouquet" id="bouquet" aria-hidden="true">
      <svg viewBox="0 0 520 600" id="svg"></svg>
    </div>

    <!-- MESSAGE -->
    <div class="message" id="message">
      <span class="line">Have a wonderful evening,</span>
      <span class="name">Beautiful P</span>
    </div>
  </div>

  <button class="replay" id="replay">Again ✿</button>

<script>
const svg = document.getElementById('svg');
const SVGNS = 'http://www.w3.org/2000/svg';

/* ---- flower builders ---- */
function rose(cx, cy, r, c1, c2, c3){
  let p = `<g class="flower">`;
  // outer petals (rotated copies)
  for(let i=0;i<8;i++){
    const a = (i/8)*360;
    p += `<ellipse cx="${cx}" cy="${cy-r*0.62}" rx="${r*0.46}" ry="${r*0.8}" fill="${c1}" transform="rotate(${a} ${cx} ${cy})"/>`;
  }
  for(let i=0;i<6;i++){
    const a = (i/6)*360 + 30;
    p += `<ellipse cx="${cx}" cy="${cy-r*0.42}" rx="${r*0.4}" ry="${r*0.6}" fill="${c2}" transform="rotate(${a} ${cx} ${cy})"/>`;
  }
  p += `<circle cx="${cx}" cy="${cy}" r="${r*0.5}" fill="${c2}"/>`;
  p += `<circle cx="${cx}" cy="${cy}" r="${r*0.26}" fill="${c3}"/>`;
  p += `</g>`;
  return p;
}
function daisy(cx, cy, r, petal, center){
  let p = `<g class="flower">`;
  for(let i=0;i<13;i++){
    const a=(i/13)*360;
    p += `<ellipse cx="${cx}" cy="${cy-r*0.7}" rx="${r*0.2}" ry="${r*0.72}" fill="${petal}" transform="rotate(${a} ${cx} ${cy})"/>`;
  }
  p += `<circle cx="${cx}" cy="${cy}" r="${r*0.38}" fill="${center}"/>`;
  p += `<circle cx="${cx}" cy="${cy}" r="${r*0.38}" fill="url(#dot)"/>`;
  p += `</g>`;
  return p;
}
function tulip(cx, cy, r, c1, c2){
  return `<g class="flower">
    <path d="M${cx-r} ${cy} q0 -${r*1.5} ${r} -${r*1.6} q${r} ${0.1*r} ${r} ${r*1.6} q-${r*0.5} ${r*0.3} -${r} 0 q-${r*0.5} ${r*0.3} -${r} 0z" fill="${c1}"/>
    <path d="M${cx} ${cy-r*1.55} q ${r*0.4} ${r*0.6} 0 ${r*1.5} q -${r*0.4} -${r*0.9} 0 -${r*1.5}z" fill="${c2}"/>
  </g>`;
}
function filler(cx, cy, c){ // baby's breath cluster
  let p = `<g class="flower">`;
  const pts=[[0,0],[8,-10],[-9,-8],[5,-18],[-6,-20],[12,-4],[-13,2]];
  pts.forEach(([dx,dy])=> p += `<circle cx="${cx+dx}" cy="${cy+dy}" r="3.4" fill="${c}"/>`);
  p += `</g>`;
  return p;
}
function leaf(x,y,rot,scale){
  return `<path class="leaf" d="M${x} ${y} q 26 -${28*scale} 0 -${64*scale} q -26 ${36*scale} 0 ${64*scale}z" fill="#4f8a66" transform="rotate(${rot} ${x} ${y})"/>`;
}

/* layout: tied bouquet, stems converge at knot ~ (260,470) */
const knotX=260, knotY=470;
const flowers=[
  // [type, x, y, size, ...colors]
  ['stem', 150, 220],
  ['stem', 360, 215],
  ['stem', 200, 180],
  ['stem', 320, 175],
  ['stem', 260, 160],
  ['stem', 120, 250],
  ['stem', 400, 250],
  ['leaf', 175, 380, -28, 1.1],
  ['leaf', 345, 380, 28, 1.1],
  ['leaf', 230, 350, -14, 1],
  ['leaf', 300, 350, 14, 1],
  ['filler', 110, 245, '#fde9f0'],
  ['filler', 410, 248, '#fde9f0'],
  ['filler', 260, 130, '#fde9f0'],
  ['daisy', 150, 220, 34, '#fff7fa', '#e9c46a'],
  ['tulip', 360, 205, 30, '#f4a3c4', '#f8c6d9'],
  ['daisy', 400, 250, 30, '#fff', '#f0b04a'],
  ['rose', 200, 180, 46, '#f8a5bb', '#e8607d', '#c43e63'],
  ['rose', 320, 175, 46, '#e8607d', '#c43e63', '#9e2b4d'],
  ['rose', 260, 200, 54, '#f7b8cb', '#ef7d9b', '#c43e63'],
];

/* build stems first (behind), then leaves, then heads */
function buildStems(){
  let s='';
  flowers.filter(f=>f[0]==='stem').forEach(f=>{
    const [_,x,y]=f;
    s += `<path class="stem" d="M${x} ${y} C ${x} ${(y+knotY)/2}, ${knotX+(x-knotX)*0.2} ${(y+knotY)/2}, ${knotX} ${knotY}" stroke="#5d9670" stroke-width="6" fill="none" stroke-linecap="round"/>`;
  });
  return s;
}
function buildWrap(){
  return `<g class="wrap">
    <path d="M180 460 Q260 420 340 460 L375 560 Q260 600 145 560 Z" fill="#f4d4de" opacity=".9"/>
    <path d="M180 460 Q260 420 340 460 L360 530 Q260 565 160 530 Z" fill="#f9e3ea"/>
    <path d="M210 470 Q260 565 310 470" stroke="#d98a9b" stroke-width="3" fill="none" opacity=".6"/>
    <rect x="232" y="468" width="56" height="20" rx="8" fill="#d98a9b"/>
    <path d="M260 478 q-26 -8 -34 10 q22 6 34 -10z" fill="#e29bab"/>
    <path d="M260 478 q26 -8 34 10 q-22 6 -34 -10z" fill="#e29bab"/>
    <circle cx="260" cy="478" r="6" fill="#c97486"/>
  </g>`;
}

const defs = `<defs>
  <radialGradient id="dot"><stop offset="0%" stop-color="#f6c453"/><stop offset="100%" stop-color="#d99a2b"/></radialGradient>
</defs>`;

function buildHeads(){
  let h='';
  flowers.forEach(f=>{
    if(f[0]==='leaf') h+=leaf(f[1],f[2],f[3],f[4]);
    if(f[0]==='filler') h+=filler(f[1],f[2],f[3]);
    if(f[0]==='daisy') h+=daisy(f[1],f[2],f[3],f[4],f[5]);
    if(f[0]==='tulip') h+=tulip(f[1],f[2],f[3],f[4],f[5]);
    if(f[0]==='rose') h+=rose(f[1],f[2],f[3],f[4],f[5],f[6]);
  });
  return h;
}

function assemble(){
  svg.innerHTML = defs
    + `<g class="sway">`
    + buildStems()
    + `</g>`
    + buildWrap()
    + `<g class="sway">`
    + buildHeads()
    + `</g>`;
}

/* stagger the animations */
function animateBouquet(){
  assemble();
  const stems=[...svg.querySelectorAll('.stem')];
  const wrap=svg.querySelector('.wrap');
  const leaves=[...svg.querySelectorAll('.leaf')];
  const blooms=[...svg.querySelectorAll('.flower')];

  // pause all
  [...stems,wrap,...leaves,...blooms].forEach(el=>el.style.animationPlayState='paused');

  stems.forEach((el,i)=> el.style.animationDelay=(0.05*i)+'s');
  if(wrap) wrap.style.animationDelay='0.5s';
  leaves.forEach((el,i)=> el.style.animationDelay=(0.6+0.08*i)+'s');
  blooms.forEach((el,i)=> el.style.animationDelay=(0.95+0.13*i)+'s');

  // sway starts after everything blooms
  const swayEls=[...svg.querySelectorAll('.sway')];
  swayEls.forEach(el=>{ el.style.animationDelay='3.4s'; });

  // resume
  requestAnimationFrame(()=>{
    [...stems,wrap,...leaves,...blooms,...swayEls].forEach(el=>{ if(el) el.style.animationPlayState='running'; });
  });
}

/* falling petals */
function spawnPetals(){
  for(let i=0;i<16;i++){
    const el=document.createElement('div');
    el.className='petalfall';
    const size=10+Math.random()*14;
    const colors=['#f4a3c4','#e8607d','#f8c6d9','#e9c46a','#fbd3df'];
    el.style.left=Math.random()*100+'vw';
    el.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 20 20"><path d="M10 1 C16 4 18 12 10 19 C2 12 4 4 10 1Z" fill="${colors[i%colors.length]}"/></svg>`;
    el.style.animationDuration=(7+Math.random()*7)+'s';
    el.style.animationDelay=(Math.random()*8)+'s';
    document.body.appendChild(el);
  }
}

/* ---- flow control ---- */
const body=document.body;
const prompt=document.getElementById('prompt');
const bouquet=document.getElementById('bouquet');
const message=document.getElementById('message');
const replay=document.getElementById('replay');
let opened=false;

function open(){
  if(opened) return; opened=true;
  body.classList.add('bloomed');
  prompt.classList.add('hide');
  setTimeout(()=>{
    bouquet.classList.add('show');
    animateBouquet();
  },450);
  setTimeout(()=> message.classList.add('show'), 3200);
  setTimeout(()=> replay.classList.add('show'), 3800);
  setTimeout(spawnPetals, 1200);
}

function reset(e){
  e.stopPropagation();
  document.querySelectorAll('.petalfall').forEach(p=>p.remove());
  bouquet.classList.remove('show');
  message.classList.remove('show');
  replay.classList.remove('show');
  body.classList.remove('bloomed');
  prompt.classList.remove('hide');
  opened=false;
  svg.innerHTML='';
}

body.addEventListener('click', open);
replay.addEventListener('click', reset);
</script>
</body>
</html>
